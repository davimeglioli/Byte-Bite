<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Dashboard {{ category }}</title>
  </head>
  <body class="cruscotto">
    <header>
      <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" />
        <h2>Dashboard {{ category }}</h2>
      </div>
      <span id="orologio-live" class="orologio-header"></span>
      <p>Sagra Natività della Beata Vergine Maria</p>
    </header>

    <div class="griglia-ordini">
      {% with ordini=ordini_non_completati %}
        {% include 'partials/_ordini.html' %}
      {% endwith %}
    </div>

    <hr class="divisore-cruscotto" />

    <h2 class="titolo-completati">Ordini Completati</h2>
    <div class="griglia-ordini">
      {% with ordini=ordini_completati, completati=True %}
        {% include 'partials/_ordini.html' %}
      {% endwith %}
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  </body>
</html>
